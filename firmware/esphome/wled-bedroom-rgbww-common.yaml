substitutions:
  device_name: wled-bedroom-rgbww
  friendly_name: WLED Bedroom RGBWW
  pwm_frequency: 19531Hz

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "GLEDOPTO GL-C-211WL ESPHome candidate for five independent RGBWW PWM channels."
  on_boot:
    priority: -100
    then:
      - output.turn_off: pwm_red
      - output.turn_off: pwm_green
      - output.turn_off: pwm_blue
      - output.turn_off: pwm_warm_white
      - output.turn_off: pwm_cold_white

esp32:
  board: esp32dev
  flash_size: 4MB
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key
  actions:
    - action: set_rgbww_12bit
      variables:
        red: int
        green: int
        blue: int
        warm_white: int
        cold_white: int
      then:
        - lambda: |-
            auto level = [](int value) -> float {
              if (value <= 0) return 0.0f;
              if (value >= 4095) return 1.0f;
              return static_cast<float>(value) / 4095.0f;
            };

            id(pwm_red).set_level(level(red));
            id(pwm_green).set_level(level(green));
            id(pwm_blue).set_level(level(blue));
            id(pwm_warm_white).set_level(level(warm_white));
            id(pwm_cold_white).set_level(level(cold_white));
    - action: all_off
      then:
        - output.turn_off: pwm_red
        - output.turn_off: pwm_green
        - output.turn_off: pwm_blue
        - output.turn_off: pwm_warm_white
        - output.turn_off: pwm_cold_white

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 0s
  ap:
    ssid: "WLED RGBWW Fallback"
    password: !secret fallback_ap_password
    ap_timeout: 90s

captive_portal:

mdns:

output:
  - platform: ledc
    id: pwm_red
    pin: GPIO19
    channel: 0
    frequency: ${pwm_frequency}
    zero_means_zero: true
  - platform: ledc
    id: pwm_green
    pin: GPIO18
    channel: 2
    frequency: ${pwm_frequency}
    zero_means_zero: true
  - platform: ledc
    id: pwm_blue
    pin: GPIO17
    channel: 4
    frequency: ${pwm_frequency}
    zero_means_zero: true
  - platform: ledc
    id: pwm_warm_white
    pin: GPIO16
    channel: 6
    frequency: ${pwm_frequency}
    zero_means_zero: true
  - platform: ledc
    id: pwm_cold_white
    pin: GPIO4
    channel: 8
    frequency: ${pwm_frequency}
    zero_means_zero: true
